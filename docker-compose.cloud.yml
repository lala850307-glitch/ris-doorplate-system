# ============================================================
# 雲地混合模式
# DB 在 GCP VM（34.135.86.88），其他服務跑本機
# 使用方式：make cloud
# API：http://localhost:8001
# Grafana：http://localhost:3001
# ============================================================
name: ris-cloud

networks:
  cloud-network:
    driver: bridge

volumes:
  grafana_cloud_data:
  loki_cloud_data:

services:

  # ── FastAPI 查詢 API（連 GCP DB）──────────────────────────
  api:
    build:
      context: ./試題2
    container_name: api-cloud
    restart: unless-stopped
    ports:
      - "8001:8000"     # 避免與地端 8000 衝突
    env_file: .env.cloud
    volumes:
      - ./試題2/static:/app/static
    networks:
      - cloud-network

  # ── Loki ────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki-cloud
    restart: unless-stopped
    ports:
      - "3101:3100"     # 避免與地端 3100 衝突
    volumes:
      - ./試題3/loki-config.yml:/etc/loki/local-config.yaml
      - loki_cloud_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - cloud-network

  # ── Promtail ─────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: promtail-cloud
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./試題3/promtail-config.yml:/etc/promtail/config.yml
      - ./試題3/promtail-positions-cloud:/tmp/positions
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - cloud-network

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana-cloud
    restart: unless-stopped
    ports:
      - "3001:3000"     # 避免與地端 3000 衝突
    volumes:
      - ./試題3/grafana/provisioning:/etc/grafana/provisioning
      - grafana_cloud_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - loki
    networks:
      - cloud-network
