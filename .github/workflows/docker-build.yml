name: Build & Push Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  OWNER: lala850307-glitch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 允許推送到 GitHub Container Registry

    steps:
      # 1. 取得程式碼
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 啟用 buildx（支援快取）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登入 GitHub Container Registry（自動使用 GITHUB_TOKEN，不需設定 Secret）
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build & Push 爬蟲（試題1）
      - name: Build and push crawler
        uses: docker/build-push-action@v5
        with:
          context: ./試題1
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/ris-crawler:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Build & Push API（試題2）
      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: ./試題2
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/ris-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
