  only:
    - main
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    # Build & Push ńł¼Ķ¤▓’╝łĶ®”ķĪī1’╝ē
    - docker build -t layla8537/ris-crawler:latest ./Ķ®”ķĪī1
    - docker push layla8537/ris-crawler:latest
    # Build & Push API’╝łĶ®”ķĪī2’╝ē
    - docker build -t layla8537/ris-api:latest ./Ķ®”ķĪī2
    - docker push layla8537/ris-api:latest
  after_script:
    - docker logout
